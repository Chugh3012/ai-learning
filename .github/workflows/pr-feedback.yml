name: pr-feedback

# The agent's SELECTION is the feedback. When a builder-radar PR MERGES, the items it acted on
# (its `items: <ids>` line) are a strong POSITIVE signal -> 👍 affinity:<maintainer-lens>. The
# negative side ("shown but not acted on") is owned by the daily feedback_ingest fb_skip rule, so
# this workflow records ONLY the positive on merge — no overlap, no dead closing-issue lookup.
#   merged   -> 👍 the acted ids (clears any prior fb_skip on them at next ingest)
#   unmerged -> nothing here; fb_skip ages those out as implicit negatives
# Written to the same feedbackevents table a human click would; daily feedback_ingest turns it
# into affinity:<maintainer-lens>. outcome.py resolves the maintainer lens by role.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  id-token: write     # OIDC -> Azure (write feedback passwordless)

jobs:
  record:
    # Only MERGED builder-radar PRs (the gh-aw agentic workflow's title prefix / label).
    if: >
      github.event.pull_request.merged == true &&
      ( startsWith(github.event.pull_request.title, '[builder-radar]') ||
        contains(github.event.pull_request.labels.*.name, 'builder-radar') )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve acted item ids
        id: ids
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR_BODY="$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body' 2>/dev/null || true)"
          ACTED="$(printf '%s' "$PR_BODY" | grep -oiE 'items:[[:space:]]*[0-9,[:space:]]+' | grep -oE '[0-9]+' | paste -sd, - || true)"
          echo "acted=$ACTED" >> "$GITHUB_OUTPUT"
          echo "acted=[$ACTED]"

      - uses: actions/setup-python@v6
        if: steps.ids.outputs.acted != ''
        with:
          python-version: "3.13"

      - run: pip install azure-data-tables azure-identity
        if: steps.ids.outputs.acted != ''

      - name: Azure login (OIDC, passwordless)
        if: steps.ids.outputs.acted != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Record acted items as maintainer 👍
        if: steps.ids.outputs.acted != ''
        env:
          FEEDBACK_STORAGE: ${{ vars.FEEDBACK_STORAGE }}
        run: python agent/outcome.py --vote up --items "${{ steps.ids.outputs.acted }}"
