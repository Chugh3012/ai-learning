name: auto-merge

# P13 — gated autonomous merge WITHOUT branch protection (which needs GitHub Pro on private
# repos). Triggers only AFTER pr-gate finishes; merges the self-improvement PR only if the gate
# PASSED. So the eval-gate (not a human, not branch protection) is the merge authority, and a
# failing gate leaves the PR open. Squash + delete branch keeps main linear and revertable.

on:
  workflow_run:
    workflows: ["pr-gate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    # Merge only when the gate passed AND the change came from the Copilot self-improve branch.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Merge the gated PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR="$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number --jq '.[0].number' 2>/dev/null || true)"
          if [ -z "${PR:-}" ] || [ "$PR" = "null" ]; then
            echo "auto-merge: no open PR for $BRANCH — nothing to merge."; exit 0
          fi
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch \
            && echo "auto-merge: merged #$PR (pr-gate passed)" \
            || echo "auto-merge: merge failed for #$PR"
