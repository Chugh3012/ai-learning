name: auto-merge

# P13 — enable auto-merge on self-improvement PRs (those from the Copilot coding agent or the
# self-improve branch prefix). GitHub merges them ONLY when branch protection's required check
# (pr-gate) passes — so the eval-gate, not a human, is the merge authority. Squash + delete
# branch keeps main linear and revertable. A human can still step in any time (close/disable).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    # Only auto-merge bot/self-improvement PRs, never arbitrary human PRs.
    if: >
      github.event.pull_request.user.login == 'Copilot' ||
      github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --squash --auto --delete-branch \
            && echo "auto-merge: armed — will merge when pr-gate is green" \
            || echo "auto-merge: could not arm (likely needs branch protection + required check)"
