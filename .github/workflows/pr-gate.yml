name: pr-gate

# The QUALITY GATE for autonomous self-improvement. Runs on EVERY PR. Three gates:
#   1. compile   — every tool + the Function must import/compile.
#   2. unit      — offline tests of the deterministic core (curate, feedback math, embed math,
#                  selection). Fast, no Azure — catches logic regressions deterministically.
#   3. eval      — ranking quality must clear config/eval.json on the labeled golden set.
# A red gate signals the reviewer not to merge; a human always reviews/merges the draft PR
# (no auto-merge — the human review step is the throughput + safety gate, by design).
# Passwordless: OIDC → Entra → Foundry. No secrets.

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Compile check (package + builder + function)
        run: |
          python - <<'PY'
          import pathlib, py_compile
          files = [*pathlib.Path('ai_scout').rglob('*.py'), *pathlib.Path('builder').glob('*.py'),
                   pathlib.Path('function/function_app.py')]
          for f in files:
              py_compile.compile(str(f), doraise=True)
          print(f'compiled {len(files)} files')
          PY

      - name: Unit tests (offline core — no Azure)
        run: python -m unittest discover -s tests -v

      - name: Azure login (OIDC, passwordless)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ranking quality gate
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL_NAME: ${{ vars.FOUNDRY_MODEL_NAME }}
          METRICS_DCE: ${{ vars.METRICS_DCE }}
          METRICS_DCR_RULE_ID: ${{ vars.METRICS_DCR_RULE_ID }}
          METRICS_STREAM: ${{ vars.METRICS_STREAM }}
        run: python -m ai_scout.cli.evaluate
