name: pr-gate

# P13 — the MERGE AUTHORITY for autonomous self-improvement. Runs on EVERY PR. When green,
# branch protection lets the PR auto-merge with no human. Two gates:
#   1. compile — every tool + the Function must import/compile.
#   2. eval    — ranking quality must clear config/eval.json on the labeled golden set.
# main cannot be broken by the self-improve loop because a red gate blocks the merge.
# Passwordless: OIDC → Entra → Foundry. No secrets.

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Compile check (all tools + function)
        run: python -m py_compile tools/*.py function/function_app.py

      - name: Azure login (OIDC, passwordless)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ranking quality gate
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL_NAME: ${{ vars.FOUNDRY_MODEL_NAME }}
        run: python tools/eval_rank.py
