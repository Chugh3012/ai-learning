name: reel-render

# Reel consumer (non-email lens). Runs in the cloud right after kb-sync finishes, so reels are
# produced whether or not a laptop is on. It consumes exactly what kb-sync published to the reel
# lens digest in Blob and renders 2 vertical deep-dive reels (top 2 stories) into Blob
# digests/reels/<date>-deep-{1,2}.mp4 for manual posting. Passwordless: OIDC -> Entra -> Blob +
# Speech (RBAC). The only secret is the Pexels b-roll API key.

on:
  workflow_run:
    workflows: ["kb-sync"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write    # OIDC token for Azure login
  contents: read

concurrency:
  group: reel-render
  cancel-in-progress: false

jobs:
  render:
    # Only render after a SUCCESSFUL kb-sync (or a manual run); skip if the sync failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Azure login (OIDC, passwordless)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Render reels for each topic's reel lens (from its Edition)
        env:
          STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT }}
          BLOB_CONTAINER: ${{ vars.BLOB_CONTAINER }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL_NAME: ${{ vars.FOUNDRY_MODEL_NAME }}
          SUBSCRIBER_STORAGE: ${{ vars.SUBSCRIBER_STORAGE }}
          FEEDBACK_STORAGE: ${{ vars.FEEDBACK_STORAGE }}
          SPEECH_RESOURCE_ID: ${{ vars.SPEECH_RESOURCE_ID }}
          SPEECH_REGION: ${{ vars.SPEECH_REGION }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m prism.cli.reel --mode deep --from-digest --upload
