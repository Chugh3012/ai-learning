name: kb-sync

# Cloud-always-on ingestion (P3). Runs whether or not the laptop is on.
# Passwordless: OIDC federation → Entra → Blob (RBAC). No secrets stored.

on:
  schedule:
    - cron: "30 1 * * *"   # daily ~07:00 IST (01:30 UTC)
  workflow_dispatch: {}

permissions:
  id-token: write    # fetch the OIDC token for Azure login
  contents: read
  issues: write      # P12: open the builder self-improvement issue when there's something to act on

concurrency:
  group: kb-state
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Azure login (OIDC, passwordless)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sync knowledge base → Blob
        env:
          STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT }}
          BLOB_CONTAINER: ${{ vars.BLOB_CONTAINER }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_MODEL_NAME: ${{ vars.FOUNDRY_MODEL_NAME }}
          ACS_ENDPOINT: ${{ vars.ACS_ENDPOINT }}
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          FEEDBACK_URL: ${{ vars.FEEDBACK_URL }}
          FEEDBACK_STORAGE: ${{ vars.FEEDBACK_STORAGE }}
        run: python tools/kb_sync.py --days 7 --rank --feedback --deliver

      # P12: the 'builder' user is just another delivery (digest channel). When its digest is
      # non-empty (something cleared the quality bar = something worth improving), hand it to
      # the Copilot coding agent as an issue. Quiet days produce no digest -> no issue -> no cost.
      - name: Self-improve — open builder issue + assign Copilot
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # Optional: a user PAT (repo + issues scope) enables AUTO-assigning the Copilot
          # coding agent. Without it the issue is opened + labeled and you assign Copilot with
          # one click — the Actions token alone cannot assign agents (by GitHub design).
          COPILOT_ASSIGN_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
        run: bash .github/scripts/open_builder_issue.sh
