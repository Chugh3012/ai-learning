# ai-scout — Layer A (ingest) + Layer B (system of record).
# Local Docker per PLAN.md P1. Graduates to Azure at P3.
# Backbone is reused OSS; we only own config. No custom images in P1.

services:
  # Layer A — turns any source (X, Reddit, GitHub, YouTube, arXiv, HN, Product Hunt, blogs) into RSS.
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "${RSSHUB_PORT:-1200}:1200"
    environment:
      NODE_ENV: production
      CACHE_EXPIRE: ${RSSHUB_CACHE_EXPIRE:-3600}
      ACCESS_KEY: ${RSSHUB_ACCESS_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Layer B — aggregate, dedupe, store; WebSub push = real pubsub. SQLite in P1.
  freshrss:
    image: freshrss/freshrss:latest
    restart: unless-stopped
    depends_on:
      - rsshub
    ports:
      - "${FRESHRSS_PORT:-8080}:80"
    environment:
      TZ: ${TZ:-UTC}
      CRON_MIN: ${FRESHRSS_CRON_MIN:-*/20}
      FRESHRSS_INSTALL: >-
        --api-enabled
        --default-user ${FRESHRSS_ADMIN_USER:-admin}
        --language en
      FRESHRSS_USER: >-
        --user ${FRESHRSS_ADMIN_USER:-admin}
        --password ${FRESHRSS_ADMIN_PASSWORD:-change-me-long-random}
        --api-password ${FRESHRSS_ADMIN_PASSWORD:-change-me-long-random}
    volumes:
      - ./data/freshrss:/var/www/FreshRSS/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/i/"]
      interval: 30s
      timeout: 10s
      retries: 5
