# ai-scout — source registry (human-friendly companion to sources.opml).
#
# sources.opml is what FreshRSS/Folo imports. This file is the readable index +
# metadata for governance. GROWTH RULE (PLAN.md): add a source = one entry here AND
# one <outline> in sources.opml. Keep both deduped. Revise, never bloat.
#
# kind: native | rsshub   (rsshub routes need the rsshub container running)
# topics: free tags used later by Layer C curation / scoring.

categories:
  labs_builders:
    - { name: OpenAI News,            kind: native, topics: [models, releases] }
    - { name: Hugging Face Blog,      kind: native, topics: [oss, models, howto] }
    - { name: Google DeepMind Blog,   kind: native, topics: [research, models] }
    - { name: GitHub Blog,            kind: native, topics: [devtools, copilot, engineering] }
    - { name: BAIR Blog,              kind: native, topics: [research] }
  practitioners:
    - { name: Simon Willison,         kind: native, topics: [howto, tools, llm] }
    - { name: Import AI,              kind: native, topics: [newsletter, trends] }
    - { name: Ahead of AI,            kind: native, topics: [newsletter, deepdive] }
    - { name: One Useful Thing,       kind: native, topics: [usage, productivity] }
    - { name: Latent Space,           kind: native, topics: [applied, engineering, llm] }
    - { name: Interconnects,          kind: native, topics: [post-training, rl, analysis] }
    - { name: Ness Labs,              kind: native, topics: [tools-for-thought, productivity, pkm] }
    - { name: The Pragmatic Engineer, kind: native, topics: [engineering, applied, trends] }
  research:
    - { name: arXiv cs.AI,            kind: native, topics: [paper, ai] }
    - { name: arXiv cs.CL,            kind: native, topics: [paper, nlp, llm] }
  # AI news & aggregators — curated high-cadence sources (from awesome-AI-feeds / readless 2026).
  ai_news:
    - { name: aifeed.dev,             kind: native, topics: [aggregator, news] }
    - { name: MarkTechPost,          kind: native, topics: [news, papers, releases] }
    - { name: MIT Technology Review (AI), kind: native, topics: [editorial, policy, analysis] }
    - { name: The Gradient,          kind: native, topics: [longform, research, alignment] }
    - { name: Last Week in AI,       kind: native, topics: [news, roundup, weekly] }
    - { name: The Verge (AI),        kind: native, topics: [news, consumer, product] }
    - { name: AWS Machine Learning Blog, kind: native, topics: [cloud, applied, tooling] }
    - { name: AI Weirdness,          kind: native, topics: [research, fun, ml] }
  communities:
    - { name: HN AI/LLM (points>=30), kind: native, topics: [community, llm] }
    - { name: HN AI agents & devtools (points>=40), kind: native, topics: [community, agents, devtools] }
    - { name: HN tools for thought (points>=30),    kind: native, topics: [community, pkm, tools-for-thought] }
  tools_launches:
    - { name: Product Hunt,                 kind: native, topics: [launch, product] }
    - { name: GitHub Releases ollama,       kind: native, topics: [tools, oss, local-llm] }
    - { name: GitHub Releases vLLM,         kind: native, topics: [tools, oss, serving] }
    - { name: GitHub Releases LangChain,    kind: native, topics: [tools, oss, agents] }
    - { name: GitHub Releases Transformers, kind: native, topics: [tools, oss, models] }
    - { name: GitHub Releases llama.cpp,    kind: native, topics: [tools, oss, local-llm] }
  # Builder Radar — for the app's 2nd user (the agent maintaining it): SDK/library changes,
  # agent frameworks, eval/MCP/Foundry engineering. Ranked through the 'builder' lens only.
  builder_radar:
    - { name: Azure SDK Blog,                    kind: native, topics: [sdk, azure, ops] }
    - { name: Microsoft DevBlogs,                kind: native, topics: [sdk, azure, ops] }
    - { name: GitHub Releases azure-sdk-python,  kind: native, topics: [sdk, breaking] }
    - { name: GitHub Releases openai-python,     kind: native, topics: [sdk, breaking] }
    - { name: GitHub Releases LangGraph,         kind: native, topics: [agents, framework] }
    - { name: GitHub Releases Agent Framework,   kind: native, topics: [agents, framework] }
    - { name: GitHub Releases Pydantic AI,       kind: native, topics: [agents, framework] }
    - { name: GitHub Releases MCP spec,          kind: native, topics: [mcp, protocol] }
  # Tools for thought & indie AI tooling — PKM, knowledge graphs, AI coding tools, local-first.
  # Covers the gap that pure labs/arXiv/SDK feeds miss; surfaces to users via the interest lens.
  tools_for_thought:
    - { name: Cursor changelog,       kind: native, topics: [coding, agents, tools] }
  # YouTube (AI) — channels expose a built-in RSS at feeds/videos.xml?channel_id=<UC...>;
  # a different host than the blocked ones, so it fetches fine from CI. Video titles+desc only.
  youtube_ai:
    - { name: YouTube Two Minute Papers, kind: native, topics: [research, explainer] }
    - { name: YouTube Yannic Kilcher,    kind: native, topics: [research, paper-walkthrough] }
    - { name: YouTube AI Explained,      kind: native, topics: [analysis, frontier] }
    - { name: YouTube Andrej Karpathy,   kind: native, topics: [applied, howto, llm] }
    - { name: YouTube sentdex,           kind: native, topics: [applied, coding, tutorial] }
    - { name: YouTube DeepLearningAI,    kind: native, topics: [education, applied] }
    - { name: YouTube The AI Search,     kind: native, topics: [news, tools, applied] }
    - { name: YouTube Matt Wolfe,        kind: native, topics: [news, tools, applied] }
    - { name: YouTube Inside AI,         kind: native, topics: [news, tools] }
    - { name: YouTube Chase H (AI),      kind: native, topics: [agents, coding, tools] }
    - { name: YouTube AI Revolution,     kind: native, topics: [news, frontier] }
    - { name: YouTube The AI Andy,       kind: native, topics: [tools, build, applied] }
    - { name: YouTube Allen Institute AI, kind: native, topics: [research, lab] }
    - { name: YouTube MIT CSAIL,         kind: native, topics: [research, lab] }

# Deferred (revisit later; not in sources.opml):
#   Reddit (r/LocalLLaMA, r/MachineLearning) — Reddit blocks feed access (native 403,
#     RSSHub IP-blocked). Re-add via RSSHub with auth cookie or a proxy in a later phase.
#   GitHub Trending — needs a GitHub token via RSSHub; native releases.atom above are
#     higher-signal and tokenless, so preferred. Enable trending later if wanted.
