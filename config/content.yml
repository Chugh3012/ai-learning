# ai-scout content FORMATS (Layer E). Growth = ADD a format here, no code.
# A format is a PRODUCTION recipe: how to turn one selected item into an artifact
# (the model prompt + the JSON output shape). It is NOT a selection lens and NOT a
# delivery channel — those live on the USER PROFILE that references this format
# (config/users.json: a profile with channel:"draft" names its format). The review
# file renders whatever keys the model produces, so a new format can change the output
# shape without touching code.
#
# Output is HUMAN-REVIEWED only. Actual publishing to any platform is a separate,
# opt-in step (not built) — see PLAN.md "publishing".

formats:
  social:
    # Generic, platform-neutral short social post for a dev/AI audience.
    temperature: 0.6
    instruction: >
      You are a social media writer for a developer/AI audience. Given one article
      (title + summary), write a short post that teaches a NEW or PRACTICAL way to
      USE AI/LLMs. Be concrete and non-hyped. Return ONLY JSON with keys:
      "hook" (<=12 words, scroll-stopping),
      "body" (<=600 chars, 1-2 short paragraphs, minimal emoji),
      "key_points" (array of 3-5 short strings, each <=120 chars),
      "tags" (array of 5-8 lowercase topic tags without the # symbol).

  reel:
    # 30-second Instagram/TikTok Reel where the HUMAN only provides the VOICE. Everything
    # visual — b-roll, AI images, on-screen text, background, music, transitions — is specified
    # by this format as a full shot-by-shot production kit. The entertainment lives in the
    # visuals/pacing the system designs, NOT in the speaker performing. Publishing stays manual.
    # (The 'reel-worthy' SELECTION lens lives on the user profile that uses this format.)
    temperature: 0.8
    instruction: >
      You are a short-video DIRECTOR. The creator will ONLY record a voiceover by reading the
      script aloud — flat, normal voice. ALL entertainment must come from the visuals, text,
      pacing, and music you design, not from the speaker. Given one article (title + summary),
      take its single most interesting idea about using AI/LLMs better and build a complete
      30-second vertical (9:16) Reel plan. Ground every claim in the provided text; never invent
      specifics. Make it genuinely engaging: a pattern-interrupt opening, one clear idea, fast
      visual cuts, a memorable 'try this' ending. Return ONLY JSON with keys:
      "hook" (the first spoken line AND opening title card, <=10 words, a bold claim or question),
      "script" (the full voiceover the creator reads, 70-90 words = ~30s at a calm pace, ONE idea,
      plain spoken English, ends on a punchy takeaway; write what to SAY, nothing else),
      "shots" (array of 4-6 beats that together cover the whole script in order; EACH beat is an
      object with: "say" = the exact script sentence(s) for this beat; "on_screen" = the big bold
      caption to overlay (<=6 words); "visual" = a concrete b-roll/stock search phrase OR an
      AI-image prompt for what fills the screen (describe it fully, vertical 9:16); "seconds" =
      approx duration as an integer),
      "broll_style" (one line: overall visual look — palette, motion, vibe so all shots feel
      cohesive),
      "music" (one line: track mood/genre/BPM feel that fits a 30s tech reel, royalty-free style),
      "caption" (Instagram caption, <=150 chars, ends with a question to spark comments),
      "hashtags" (array of 8-12 lowercase tags without the # symbol).

  # Example of how to extend later (kept commented = no dead config, just a guide):
  # linkedin:
  #   temperature: 0.5
  #   instruction: >
  #     Write a professional LinkedIn post ... Return ONLY JSON with keys
  #     "hook", "body" (<=1300 chars), "takeaways" (array), "tags" (array).
